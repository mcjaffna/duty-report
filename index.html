<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMC — நாளாந்த கடமை அறிக்கை</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@300;400;500;600;700&display=swap');

:root {
  --navy:  #0d2137;
  --blue:  #1a4a8a;
  --gold:  #c9972a;
  --light: #eaf1fb;
  --bg:    #f0f4fa;
  --white: #ffffff;
  --bdr:   #cdd8ec;
  --txt:   #192840;
  --muted: #6b80a3;
  --green: #1a7a4a; --gbg: #e6f4ed;
  --amber: #b05c00; --abg: #fef0e0;
  --red:   #991818; --rbg: #fdeaea;
  --sh:    0 2px 12px rgba(13,33,55,0.10);
  --r:     12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans Tamil', sans-serif;
  background: var(--bg);
  color: var(--txt);
  min-height: 100vh;
  font-size: 14px;
}

.hdr {
  background: linear-gradient(160deg, var(--navy) 0%, #1e3f72 100%);
  color: #fff;
  box-shadow: var(--sh);
  position: sticky; top: 0; z-index: 50;
}
.hdr-top {
  max-width: 780px; margin: 0 auto;
  padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
}
.hdr-icon {
  width: 48px; height: 48px; flex-shrink: 0;
  background: var(--gold); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.hdr-title { font-size: 16px; font-weight: 700; letter-spacing: 0.2px; }
.hdr-sub   { font-size: 12px; opacity: 0.65; margin-top: 3px; }

.tabs {
  border-top: 1px solid rgba(255,255,255,0.12);
  display: flex;
  max-width: 780px; margin: 0 auto;
}
.tab {
  flex: 1; padding: 11px 0;
  color: rgba(255,255,255,0.55);
  font-size: 13.5px; font-weight: 600;
  text-align: center; cursor: pointer;
  border: none; background: none;
  border-bottom: 3px solid transparent;
  font-family: inherit; transition: all .2s;
  letter-spacing: 0.2px;
}
.tab:hover { color: #fff; }
.tab.on { color: var(--gold); border-bottom-color: var(--gold); }

.main { max-width: 780px; margin: 0 auto; padding: 22px 16px 40px; }
.panel { display: none; }
.panel.on { display: block; }

.card {
  background: var(--white);
  border-radius: var(--r);
  box-shadow: var(--sh);
  border: 1px solid var(--bdr);
  padding: 22px;
  margin-bottom: 16px;
}
.card-hd {
  font-size: 13px; font-weight: 700;
  color: var(--blue);
  padding-bottom: 12px; margin-bottom: 18px;
  border-bottom: 1.5px solid var(--light);
  display: flex; align-items: center; gap: 8px;
}

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.row1 { margin-bottom: 14px; }

.fg { display: flex; flex-direction: column; gap: 6px; }
.fg label {
  font-size: 11.5px; font-weight: 700;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
}
.fg input, .fg select, .fg textarea {
  padding: 10px 13px;
  border: 1.5px solid var(--bdr);
  border-radius: 8px;
  font-size: 13.5px; font-family: inherit;
  color: var(--txt); background: #fff;
  outline: none; transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}
.fg input:focus, .fg select:focus, .fg textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(26,74,138,0.12);
}
.fg textarea { resize: vertical; min-height: 68px; line-height: 1.5; }

/* ── DATE LOCK ── */
/* ✅ பிழை 1 சரிசெய்யப்பட்டது: pointer-events மூலம் click block செய்கிறோம் */
#sdate {
  pointer-events: none;
  background: #f0f4fa;
  color: var(--muted);
  cursor: not-allowed;
}

.tblock {
  background: var(--light);
  border: 1.5px solid #c2d3ed;
  border-radius: 10px;
  padding: 16px; margin-bottom: 12px;
}
.tblock-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 13px;
}
.tnum {
  font-size: 11px; font-weight: 800;
  color: var(--blue); background: #fff;
  border: 1px solid var(--bdr);
  padding: 3px 12px; border-radius: 20px;
  letter-spacing: 0.4px;
}
.del-btn {
  background: var(--rbg); color: var(--red);
  border: 1px solid #f0b0b0; border-radius: 7px;
  padding: 4px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: background .15s;
}
.del-btn:hover { background: #f8d0d0; }

.add-btn {
  width: 100%; padding: 12px;
  background: #fff; border: 2px dashed #4a7cc0;
  border-radius: 10px; color: var(--blue);
  font-size: 13.5px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  transition: background .2s; margin-bottom: 18px;
}
.add-btn:hover { background: var(--light); }

.btn {
  display: block; width: 100%;
  padding: 14px; font-size: 15px; font-weight: 700;
  background: linear-gradient(135deg, #1d55a0, var(--navy));
  color: #fff; border: none; border-radius: 10px;
  cursor: pointer; font-family: inherit;
  letter-spacing: 0.3px; transition: opacity .2s;
  box-shadow: 0 4px 14px rgba(13,33,55,0.22);
}
.btn:hover { opacity: .92; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

.alert {
  padding: 14px 16px; border-radius: 9px;
  font-size: 13.5px; margin-bottom: 16px; line-height: 1.55;
}
.ok  { background: var(--gbg); color: var(--green); border: 1px solid #9dd4b5; }
.err { background: var(--rbg); color: var(--red);   border: 1px solid #f0a0a0; }

.hero-score {
  background: linear-gradient(140deg, var(--navy) 0%, #1e4278 100%);
  border-radius: var(--r);
  padding: 28px 24px;
  color: #fff;
  text-align: center;
  margin-bottom: 16px;
  position: relative; overflow: hidden;
}
.hero-score::before {
  content: '🏆';
  position: absolute; right: 20px; top: 18px;
  font-size: 52px; opacity: .12;
}
.hero-name   { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.hero-branch { font-size: 12px; opacity: .65; margin-bottom: 18px; }
.hero-pts    { font-size: 54px; font-weight: 800; color: var(--gold); line-height: 1; }
.hero-lbl    { font-size: 13px; opacity: .7; margin-top: 6px; }

.stat-row {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 12px;
  margin-bottom: 16px;
}
.stat {
  background: var(--white);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  padding: 16px 10px; text-align: center;
}
.stat .sv { font-size: 26px; font-weight: 800; }
.stat .sl { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 600; }
.stat.g { border-color: #9dd4b5; } .stat.g .sv { color: var(--green); }
.stat.a { border-color: #f0c080; } .stat.a .sv { color: var(--amber); }
.stat.r { border-color: #f0a0a0; } .stat.r .sv { color: var(--red); }

.twrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--bdr); }
table  { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  background: var(--navy); color: #fff;
  padding: 10px 13px; text-align: left;
  font-size: 11.5px; font-weight: 600; letter-spacing: 0.3px;
}
td { padding: 10px 13px; border-bottom: 1px solid #eaf0f8; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--light); }

.badge {
  display: inline-block; padding: 3px 10px;
  border-radius: 20px; font-size: 11.5px; font-weight: 700;
  white-space: nowrap;
}
.bc { background: var(--gbg); color: var(--green); }
.bi { background: var(--abg); color: var(--amber); }
.bp { background: var(--rbg); color: var(--red); }

@media (max-width: 580px) {
  .row2, .row3 { grid-template-columns: 1fr; }
  .stat-row    { grid-template-columns: 1fr 1fr 1fr; }
  .stat .sv    { font-size: 20px; }
  .hero-pts    { font-size: 42px; }
}
</style>
</head>
<body>

<div class="hdr">

    <div>
      <div class="hdr-title">யாழ்ப்பாணம் மாநகர சபை</div>
      <div class="hdr-sub">நாளாந்த கடமை அறிக்கை</div>
    </div>
  </div>

    <button class="tab"    id="t2" onclick="go('score',this)">🏅 என் புள்ளிகள்</button>

</div>

<div class="main">

  <!-- SUBMIT PANEL -->

    <div id="submit-msg"></div>

    <div class="card">

      <div class="row2">

      <div class="row1">

          <select id="spost">
            <option value="">— பதவியை தேர்ந்தெடுக்க —</option>
            <option>அபிவிருத்தி உத்தியோகத்தர் சேவை</option>

      </div>

      <div class="row1">
        <div class="fg">
          <label>கிளை *</label>
          <select id="sbranch">
            <option value="">— கிளையை தேர்ந்தெடுக்க —</option>
            <option>ஆணையாளர் பகுதி</option>
            <option>தாபனப்பகுதி</option>
            <option>கொள்வனவுப் பகுதி</option>
            <option>உள்ளகக் கணக்ககாய்வு</option>
            <option>திட்டமிடல் பகுதி</option>
            <option>செயலாளர் பகுதி</option>
            <option>நூலகம்</option>
            <option>பதிவகம்</option>
            <option>சுகாதார வைத்திய அதிகாரி பணிமனை</option>
            <option>கணக்குப்பகுதி</option>
            <option>நானாவித இறைவரிப் பகுதி</option>
            <option>சோலைவரிப் பகுதி</option>
            <option>களஞ்சியப்பகுதி</option>
            <option>முன்னரங்கப் பகுதி</option>
            <option>வருமானப் பரிசோதகர் பகுதி</option>
            <option>வேலைப்பகுதி</option>
            <option>நீர்வேலைப்பகுதி</option>
            <option>வாகனப்பகுதி</option>
            <option>பொதுச்சுகாதார பொறியியற்பிரிவு</option>
            <option>வேலைத்தளம்</option>
            <option>மின்சாரப்பகுதி</option>
          </select>
        </div>
      </div>

      <div class="row1">
        <div class="fg">
          <label>அறிக்கை திகதி *</label>
          <!-- ✅ பிழை 1 சரிசெய்யப்பட்டது: CSS pointer-events மூலம் lock -->
          <input id="sdate" type="date">

    </div>

    <div class="card">
      <div class="card-hd">📋 இன்றைய பணிகள்</div>
      <div id="tasks"></div>
      <button class="add-btn" onclick="addTask()">＋ மேலும் ஒரு பணி சேர்க்கவும்</button>
      <button class="btn" id="sbtn" onclick="submitReport()">✅ அறிக்கையை சமர்ப்பிக்கவும்</button>
    </div>

  </div>

  <!-- SCORE PANEL -->
  <div class="panel" id="p-score">

    <div class="card">
      <div class="card-hd">🔍 உத்தியோகத்தரைத் தேடுங்கள்</div>
      <div class="row2" style="margin-bottom:14px">
        <div class="fg">
          <label>பெயர் *</label>
          <input id="lname" type="text" placeholder="உங்கள் பெயர் தட்டச்சு செய்யவும்">
        </div>
        <div class="fg">
          <label>கிளை (விருப்பத்தேர்வு)</label>
          <select id="lbranch">
            <option value="">— எல்லா கிளைகளும் —</option>
            <option>ஆணையாளர் பகுதி</option>
            <option>தாபனப்பகுதி</option>
            <option>கொள்வனவுப் பகுதி</option>
            <option>உள்ளகக் கணக்ககாய்வு</option>
            <option>திட்டமிடல் பகுதி</option>
            <option>செயலாளர் பகுதி</option>
            <option>நூலகம்</option>
            <option>பதிவகம்</option>
            <option>சுகாதார வைத்திய அதிகாரி பணிமனை</option>
            <option>கணக்குப்பகுதி</option>
            <option>நானாவித இறைவரிப் பகுதி</option>
            <option>சோலைவரிப் பகுதி</option>
            <option>களஞ்சியப்பகுதி</option>
            <option>முன்னரங்கப் பகுதி</option>
            <option>வருமானப் பரிசோதகர் பகுதி</option>
            <option>வேலைப்பகுதி</option>
            <option>நீர்வேலைப்பகுதி</option>
            <option>வாகனப்பகுதி</option>
            <option>பொதுச்சுகாதார பொறியியற்பிரிவு</option>

            <option>மின்சாரப்பகுதி</option>
          </select>
        </div>
      </div>
      <button class="btn" onclick="lookupScore()">🔍 புள்ளிகளை பாருங்கள்</button>
    </div>

    <div id="score-out"></div>

  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZyD3H2WeZX62lkmH4vSUXO46j_MWZrG70Qbydczl4OxjMUn8Z-AgcIl-sFeqjVUI/exec';

// ─── TABS ─────────────────────────────────────────────
function go(panel, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  document.getElementById('p-' + panel).classList.add('on');
  btn.classList.add('on');
}

// ─── TASK COUNTER ─────────────────────────────────────
// ✅ பிழை 2 சரிசெய்யப்பட்டது: tc global-ஆக சரியாக declare செய்யப்பட்டது
let tc = 0;

function addTask() {
  tc++;
  const c = document.getElementById('tasks');
  const d = document.createElement('div');
  d.className = 'tblock';
  d.id = 'tk' + tc;
  const taskNum = tc; // closure-க்காக தனியாக வைக்கிறோம்
  d.innerHTML = `
    <div class="tblock-top">
      <span class="tnum">பணி ${taskNum}</span>
      ${taskNum > 1 ? `<button class="del-btn" onclick="document.getElementById('tk${taskNum}').remove()">✕ நீக்கு</button>` : ''}
    </div>
    <div class="row1">
      <div class="fg">
        <label>பணி விவரம் *</label>
        <textarea class="td" placeholder="இன்று செய்த வேலையை சுருக்கமாக விவரிக்கவும்…"></textarea>
      </div>
    </div>
    <div class="row3">
      <div class="fg">
        <label>ஆரம்பம்</label>
        <input type="time" class="ts">
      </div>
      <div class="fg">
        <label>முடிவு</label>
        <input type="time" class="te">
      </div>
      <div class="fg">
        <label>நிலை *</label>
        <select class="tstatus">
          <option value="">— தேர்வு —</option>
          <option value="Completed">✅ முடிந்தது</option>
          <option value="In Progress">🔄 நடைபெறுகிறது</option>
          <option value="Pending">⏳ நிலுவையில்</option>
        </select>
      </div>
    </div>`;
  c.appendChild(d);
}

// ─── SUBMIT ───────────────────────────────────────────
// ✅ பிழை 2 சரிசெய்யப்பட்டது: finally தனியாக இல்லாமல் try...catch...finally ஒன்றாக
async function submitReport() {
  const msg = document.getElementById('submit-msg');
  msg.innerHTML = '';

  const name   = document.getElementById('sname').value.trim();
  const nic    = document.getElementById('snic').value.trim();
  const post   = document.getElementById('spost').value;
  const branch = document.getElementById('sbranch').value;
  const date   = document.getElementById('sdate').value;

  if (!name || !post || !branch || !date) {
    msg.innerHTML = `<div class="alert err">⚠️ பெயர், பதவி, கிளை மற்றும் திகதி கட்டாயம் நிரப்பவும்.</div>`;
    window.scrollTo(0,0); return;
  }

  const tasks = [];
  document.querySelectorAll('.tblock').forEach(b => {
    const desc   = b.querySelector('.td').value.trim();
    const start  = b.querySelector('.ts').value;
    const end    = b.querySelector('.te').value;
    const status = b.querySelector('.tstatus').value;
    if (desc && status) tasks.push({ description: desc, startTime: start, endTime: end, status });
  });

  if (!tasks.length) {
    msg.innerHTML = `<div class="alert err">⚠️ குறைந்தது ஒரு பணியாவது நிரப்பவும்.</div>`;
    return;
  }

  const btn = document.getElementById('sbtn');
  btn.disabled = true;
  btn.textContent = '⏳ சமர்ப்பிக்கின்றது…';

  const payload = { name, nic, post, branch, date, tasks };
  localStorage.setItem('jmc_staff', JSON.stringify({ name, nic, post, branch }));

  if (!SCRIPT_URL) {
    done(name, tasks);
    btn.disabled = false;
    btn.textContent = '✅ அறிக்கையை சமர்ப்பிக்கவும்';
    return;
  }

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    done(name, tasks);
}

function done(name, tasks) {
  const c   = tasks.filter(t => t.status === 'Completed').length;
  const i   = tasks.filter(t => t.status === 'In Progress').length;
  const p   = tasks.filter(t => t.status === 'Pending').length;
  const pts = (c * 10) + (i * 5) + (p * 2);
  const msg = document.getElementById('submit-msg');
  msg.innerHTML = `
    <div class="alert ok">
      ✅ <strong>${name}</strong> அவர்களின் அறிக்கை வெற்றிகரமாக சமர்ப்பிக்கப்பட்டது!<br>
      📋 ${tasks.length} பணிகள் &nbsp;|&nbsp; +${pts} புள்ளிகள் இன்று சேர்ந்தன
    </div>`;
  document.getElementById('tasks').innerHTML = '';
  tc = 0;
  addTask();
  window.scrollTo(0, 0);
}

// ─── SCORE LOOKUP ─────────────────────────────────────
async function lookupScore() {
  const name   = document.getElementById('lname').value.trim();
  const branch = document.getElementById('lbranch').value;
  const out    = document.getElementById('score-out');

  if (!name) {
    out.innerHTML = `<div class="alert err">⚠️ தேட பெயர் உள்ளிடவும்.</div>`; return;
  }

  if (!SCRIPT_URL) { demoScore(name, branch); return; }

  out.innerHTML = `<div style="text-align:center;padding:30px;color:var(--muted)">⏳ தரவு ஏற்றுகிறது…</div>`;
  try {
    const r = await fetch(`${SCRIPT_URL}?name=${encodeURIComponent(name)}&branch=${encodeURIComponent(branch)}`);
    const d = await r.json();
    renderScore(name, branch, d.score, d.history);
  } catch {
    out.innerHTML = `<div class="alert err">❌ தரவு பெற முடியவில்லை.</div>`;
  }
}

function demoScore(name, branch) {
  renderScore(name, branch || 'தாபனப்பகுதி',
    { completed: 14, inProgress: 4, pending: 3, totalScore: 183 },
    [
      { date:'2026-07-07', task:'மாதாந்த அறிக்கை தயாரித்தல்', startTime:'09:00', endTime:'10:30', status:'Completed'   },
      { date:'2026-07-07', task:'கூட்டத்தில் கலந்துகொள்ளல்',   startTime:'11:00', endTime:'12:00', status:'Completed'   },
      { date:'2026-07-06', task:'கடிதம் தயாரித்தல்',           startTime:'09:30', endTime:'10:00', status:'Completed'   },
      { date:'2026-07-06', task:'கள ஆய்வு',                    startTime:'14:00', endTime:'',      status:'In Progress' },
      { date:'2026-07-05', task:'தணிக்கை கோப்பு தயாரிப்பு',   startTime:'09:00', endTime:'',      status:'Pending'     },
    ], true);
}

function renderScore(name, branch, s, history, demo=false) {
  const out   = document.getElementById('score-out');
  const total = s.completed + s.inProgress + s.pending;

  const rows = history.length
    ? history.map(h => {
        const bc  = h.status==='Completed' ? 'bc' : h.status==='In Progress' ? 'bi' : 'bp';
        const lbl = h.status==='Completed' ? 'முடிந்தது' : h.status==='In Progress' ? 'நடைபெறுகின்றது' : 'நிலுவையில்';
        const time = h.startTime ? `${h.startTime}${h.endTime ? ' → '+h.endTime : ''}` : '—';
        return `<tr>
          <td style="white-space:nowrap">${h.date}</td>
          <td>${h.task}</td>
          <td style="white-space:nowrap;font-size:12px">${time}</td>
          <td><span class="badge ${bc}">${lbl}</span></td>
        </tr>`;
      }).join('')
    : `<tr><td colspan="4" style="text-align:center;padding:22px;color:var(--muted)">பணி வரலாறு இல்லை</td></tr>`;

  out.innerHTML = `
    ${demo ? `<div class="alert" style="background:#fffbe6;border:1px solid #f0d060;color:#7a5800;border-radius:9px;padding:12px 15px;margin-bottom:16px;font-size:13px">
      ℹ️ இது demo தரவு. Apps Script URL அமைத்தால் உண்மையான தரவு தோன்றும்.</div>` : ''}
    <div class="hero-score">
      <div class="hero-name">${name}</div>
      <div class="hero-branch">${branch || ''}</div>
      <div class="hero-pts">${s.totalScore}</div>
      <div class="hero-lbl">மொத்த புள்ளிகள் &nbsp;·&nbsp; ${total} பணிகள்</div>
    </div>
    <div class="stat-row">
      <div class="stat g">
        <div class="sv">${s.completed}</div>
        <div class="sl">✅ முடிந்தவை<br><span style="font-size:10px;opacity:.7">× 10 புள்ளி</span></div>
      </div>
      <div class="stat a">
        <div class="sv">${s.inProgress}</div>
        <div class="sl">🔄 நடைபெறுவை<br><span style="font-size:10px;opacity:.7">× 5 புள்ளி</span></div>
      </div>
      <div class="stat r">
        <div class="sv">${s.pending}</div>
        <div class="sl">⏳ நிலுவையில்<br><span style="font-size:10px;opacity:.7">× 2 புள்ளி</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">📋 பணிகள்</div>
      <div class="twrap">
        <table>
          <thead><tr><th>திகதி</th><th>பணி விபரம்</th><th>நேரம்</th><th>நிலை</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ─── INIT ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // ✅ பிழை 1 சரிசெய்யப்பட்டது: today மட்டும் — மாற்ற முடியாது
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('sdate').value = today;
  document.getElementById('sdate').setAttribute('min', today);
  document.getElementById('sdate').setAttribute('max', today);

  // Auto fill saved staff details
  const saved = localStorage.getItem('jmc_staff');
  if (saved) {
    const s = JSON.parse(saved);
    document.getElementById('sname').value   = s.name   || '';
    document.getElementById('snic').value    = s.nic    || '';
    document.getElementById('spost').value   = s.post   || '';
    document.getElementById('sbranch').value = s.branch || '';
  }

  addTask();
});
</script>
